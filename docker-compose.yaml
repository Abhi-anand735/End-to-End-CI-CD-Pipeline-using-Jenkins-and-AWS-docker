version: "3.9"

services:

  app:
    container_name: cicd-flask-app

    build:
      context: .
      dockerfile: Dockerfile

    image: cicd-flask-app:latest

    restart: unless-stopped

    environment:
      APP_NAME: "End-to-End CI/CD Demo"
      APP_VERSION: "1.0.0"
      BUILD_NUMBER: "LOCAL"
      GIT_COMMIT: "development"
      DEPLOY_ENV: "Development"
      PORT: 5000

    expose:
      - "5000"

    ports:
      - "5000:5000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - cicd-network

    volumes:
      - ./logs:/app/logs

  nginx:

    container_name: nginx-proxy

    build:
      context: ./nginx

    depends_on:
      app:
        condition: service_healthy

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - cicd-network

networks:
  cicd-network:
    driver: bridge
